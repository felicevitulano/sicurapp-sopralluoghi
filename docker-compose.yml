version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sicurapp_db
    environment:
      POSTGRES_USER: sicurapp
      POSTGRES_PASSWORD: sicurapp_dev
      POSTGRES_DB: sicurapp_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sicurapp -d sicurapp_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    container_name: sicurapp_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://sicurapp:sicurapp_dev@postgres:5432/sicurapp_dev
      PORT: 3001
      MEDIA_DIR: /app/media
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - '3001:3001'
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    container_name: sicurapp_frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - '5173:5173'
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
  media_data:
